[target.aarch64-unknown-linux-gnu]
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update",
  "apt-get --assume-yes install libasound2-dev:$CROSS_DEB_ARCH pkg-config"
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update",
  "apt-get --assume-yes install libasound2-dev:$CROSS_DEB_ARCH pkg-config"
]

[target.i686-unknown-linux-gnu]
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update",
  "apt-get --assume-yes install libasound2-dev:$CROSS_DEB_ARCH pkg-config"
]
