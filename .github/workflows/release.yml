name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: lyricwave
  CARGO_TERM_COLOR: always

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "release tag is required"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-linux:
    name: build linux / ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
            build_deb: true
          - target: i686-unknown-linux-gnu
            use_cross: true
            build_deb: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true
            build_deb: false
          - target: armv7-unknown-linux-gnueabihf
            use_cross: true
            build_deb: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install native Linux audio build dependencies
        if: matrix.use_cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary (native)
        if: matrix.use_cross == false
        run: cargo build --locked --release -p lyricwave-cli --bin $BIN_NAME --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.use_cross == true
        run: cross build --locked --release -p lyricwave-cli --bin $BIN_NAME --target ${{ matrix.target }}

      - name: Package Linux tar.gz
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/$BIN_NAME dist/$BIN_NAME
          tar -C dist -czf lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.tar.gz $BIN_NAME

      - name: Build Debian package (amd64)
        if: matrix.build_deb == true
        run: |
          cargo install cargo-deb --locked
          cargo deb -p lyricwave-cli --no-build --no-strip --target ${{ matrix.target }} \
            --output lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.target }}
          path: |
            lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.tar.gz
            lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.deb
          if-no-files-found: ignore

  build-macos:
    name: build macos / ${{ matrix.target }}
    needs: resolve-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release -p lyricwave-cli --bin $BIN_NAME --target ${{ matrix.target }}

      - name: Package macOS tar.gz
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/$BIN_NAME dist/$BIN_NAME
          tar -C dist -czf lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.tar.gz $BIN_NAME

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.target }}
          path: lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.tar.gz

  build-windows:
    name: build windows / ${{ matrix.target }}
    needs: resolve-tag
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
          - target: i686-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release -p lyricwave-cli --bin $env:BIN_NAME --target ${{ matrix.target }}

      - name: Package Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" "dist/$env:BIN_NAME.exe"
          Compress-Archive -Path "dist/$env:BIN_NAME.exe" -DestinationPath "lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ matrix.target }}
          path: lyricwave-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.zip

  publish:
    name: publish release
    needs: [resolve-tag, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: |
            dist/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
